name: ailabtools
description: Official Dart and Flutter SDK for AILabTools AI image APIs, including background removal, image upscaling, portrait editing, and more.
version: 0.5.4
homepage: https://www.ailabtools.com/
repository: https://github.com/ailabtools/ailabtools-sdk
issue_tracker: https://github.com/ailabtools/ailabtools-sdk/issues
documentation: https://www.ailabtools.com/docs

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  http: ^1.2.0
  http_parser: ^4.0.2

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0

topics:
  - artificial-intelligence
  - image-processing
  - background-removal
  - flutter
  - api-client
