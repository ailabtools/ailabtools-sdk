[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ailabtools-sdk"
version = "0.1.0"
description = "AILabTools SDK for Python (async)"
readme = "README.md"
requires-python = ">=3.8"
dependencies = ["httpx>=0.27"]

[tool.setuptools]
packages = ["ailabtools", "ailabtools.generated"]
