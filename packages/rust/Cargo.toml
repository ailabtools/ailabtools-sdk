[package]
name = "ailabtools"
version = "0.5.4"
edition = "2021"
rust-version = "1.70"
license = "MIT"
description = "Official Rust SDK for AILabTools AI image and portrait APIs."
readme = "README.md"
homepage = "https://www.ailabtools.com"
repository = "https://github.com/ailabtools/ailabtools-sdk"
documentation = "https://www.ailabtools.com/docs"
keywords = ["ailabtools", "image", "ai", "sdk", "vision"]
categories = ["api-bindings", "multimedia::images"]
include = ["src/**/*", "examples/**/*", "tests/**/*", "Cargo.toml", "README.md", "CHANGELOG.md", "LICENSE"]

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", default-features = false, features = ["time"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
